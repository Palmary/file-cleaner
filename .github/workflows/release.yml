name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: file-cleaner-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: file-cleaner-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: file-cleaner-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: file-cleaner-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/file-cleaner
          cp target/${{ matrix.target }}/release/file-cleaner dist/file-cleaner/
          cp README.md LICENSE config.example.json dist/file-cleaner/
          tar -czf ${{ matrix.archive }} -C dist file-cleaner

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\file-cleaner -Force
          Copy-Item target\${{ matrix.target }}\release\file-cleaner.exe dist\file-cleaner\
          Copy-Item README.md dist\file-cleaner\
          Copy-Item LICENSE dist\file-cleaner\
          Copy-Item config.example.json dist\file-cleaner\
          Compress-Archive -Path dist\file-cleaner -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
